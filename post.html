<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — LINESBYLIN</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-hero {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-lg);
      box-shadow: var(--shadow-medium);
    }

    .post-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }

    .post-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--soft-blue);
      color: var(--forest-green);
      font-family: var(--font-body);
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      padding: 4px 12px;
      border-radius: var(--radius-lg);
      border: var(--border-width) solid var(--warm-beige);
    }

    .post-date {
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .post-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-lg);
    }

    .post-divider {
      border: none;
      border-top: var(--border-width) solid var(--warm-beige);
      margin: var(--space-lg) 0;
    }

    .post-body {
      font-family: var(--font-body);
      font-size: var(--text-lg);
      line-height: 1.85;
      color: var(--text-primary);
    }

    /* ── Poem layout ──────────────────────────────────── */
    .post-body.poem-style {
      font-family: var(--font-heading);
      font-style: italic;
      text-align: center;
      max-width: 520px;       /* narrower column — poems breathe better */
      margin: 0 auto;
    }

    /* Opening ornament before first stanza */
    .post-body.poem-style .poem-stanza:first-child::before {
      content: '✦';
      display: block;
      font-style: normal;
      font-size: 1rem;
      color: var(--soft-blue);
      margin-bottom: var(--space-md);
      letter-spacing: 0.4em;
      opacity: 0.7;
    }

    /* Stanza separator — visible gap with a faint dot between stanzas */
    .post-body.poem-style .poem-stanza {
      margin-bottom: 0;
      padding-bottom: var(--space-lg);
      position: relative;
    }

    .post-body.poem-style .poem-stanza:not(:last-child)::after {
      content: '';
      display: block;
      width: 24px;
      height: 24px;
      margin: 0 auto;
      background: radial-gradient(circle, var(--soft-blue) 30%, transparent 70%);
      border-radius: 50%;
      opacity: 0.5;
      position: absolute;
      bottom: calc(var(--space-md) * -0.5);
      left: 50%;
      transform: translateX(-50%);
    }

    /* Lines within a stanza — tighter than the gap between stanzas */
    .post-body.poem-style .poem-stanza p {
      margin: 0;
      line-height: 2.05;
      font-size: var(--text-lg);
    }

    .post-body.poem-style .poem-stanza p:empty {
      height: 0.6em;
      display: block;
    }

    /* Closing ornament after last stanza */
    .post-body.poem-style .poem-stanza:last-child {
      padding-bottom: var(--space-md);
    }
    .post-body.poem-style .poem-stanza:last-child::after {
      content: '✦';
      display: block;
      font-style: normal;
      font-size: 1rem;
      color: var(--soft-blue);
      margin-top: var(--space-md);
      letter-spacing: 0.4em;
      opacity: 0.7;
      background: none;
      width: auto;
      height: auto;
      position: static;
      transform: none;
      border-radius: 0;
    }

    .post-body p { margin-bottom: var(--space-md); }
    .post-body h2 { margin: var(--space-lg) 0 var(--space-sm); }
    .post-body h3 { margin: var(--space-md) 0 var(--space-xs); }
    .post-body blockquote {
      border-left: 4px solid var(--forest-green);
      padding: var(--space-sm) var(--space-md);
      margin: var(--space-md) 0;
      background: var(--soft-blue);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      color: var(--forest-green);
      margin-bottom: var(--space-lg);
      padding: 6px 14px;
      border-radius: var(--radius-lg);
      border: var(--border-width) solid var(--warm-beige);
      background: var(--bg-surface);
      transition: all var(--transition-fast);
    }
    .back-link:hover {
      background: var(--warm-beige);
      color: var(--dark-moss);
      transform: translateX(-2px);
    }

    .post-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: var(--space-md);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .post-not-found {
      text-align: center;
      padding: var(--space-xl);
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
    }

    /* ── Prev / Next navigation ─────────────────────────── */
    /* ── Prev / Next navigation ─────────────────────────── */
    .post-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: var(--border-width) solid var(--warm-beige);
    }

    .post-nav-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: var(--font-body);
      color: var(--text-primary);
      padding: var(--space-sm) var(--space-md);
      border: var(--border-width) solid var(--warm-beige);
      border-radius: var(--radius-lg);
      background: var(--bg-surface);
      text-decoration: none;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-soft);
    }
    .post-nav-btn:hover {
      background: var(--warm-beige);
      border-color: var(--soft-blue);
      box-shadow: var(--shadow-medium);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    .post-nav-prev { align-items: flex-start; }
    .post-nav-next { align-items: flex-end; }

    .post-nav-label {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--forest-green);
      opacity: 0.8;
    }
    .post-nav-title {
      font-family: var(--font-heading);
      font-size: var(--text-lg);
      line-height: 1.3;
      color: var(--text-primary);
      word-break: break-word;
    }
    .post-nav-empty {
      /* invisible placeholder to keep next btn right-aligned when prev is missing */
    }

    @media (max-width: 600px) {
      .post-nav { grid-template-columns: 1fr; }
      .post-nav-next { align-items: flex-start; }
    }
  </style>
</head>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/main.js"></script>
  <script>
    const catIcons = { blog: 'assets/icons/blog.svg', poem: 'assets/icons/poem.svg', story: 'assets/icons/story.svg' };
    const catNames  = { blog: 'Blog', poem: 'Poem', story: 'Story' };
    const catPages  = { blog: 'blog.html', poem: 'poems.html', story: 'stories.html' };

    async function loadPost() {
      const params    = new URLSearchParams(window.location.search);
      const id        = params.get('id');
      const container = document.getElementById('post-container');

      if (!id) { container.innerHTML = '<p class="post-not-found">No post specified.</p>'; return; }

      try {
        const post = await getPostById(id);
        if (!post) throw new Error('not found');

        const date = post.date
          ? new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
          : '';

        const backPage  = catPages[post.category] || 'index.html';
        const backLabel = catNames[post.category] || 'Back';
        const icon      = catIcons[post.category] ? `<img src="${catIcons[post.category]}" class="nav-icon" alt="">` : '';
        const isPoem    = post.category === 'poem';

        document.title = `${post.title} — LINESBYLIN`;

        let sections = [];
        if (Array.isArray(post.sections)) {
          sections = post.sections;
        } else if (typeof post.sections === 'string') {
          try { sections = JSON.parse(post.sections); } catch(e) { sections = []; }
        }

        const bodyHTML = sections.map(sec => renderSection(sec, isPoem)).join('');

        container.innerHTML = `
          <a href="${backPage}" class="back-link">Back to ${backLabel}s</a>
          ${post.imageURL ? `<img class="post-hero" src="${post.imageURL}" alt="${post.title}">` : ''}
          <div class="post-meta">
            <span class="post-category-badge">${icon} ${catNames[post.category] || post.category}</span>
            ${date ? `<span class="post-date">${date}</span>` : ''}
          </div>
          <h1 class="post-title">${post.title}</h1>
          <hr class="post-divider">
          <div class="post-body ${isPoem ? 'poem-style' : ''}">
            ${bodyHTML || '<p>No content yet.</p>'}
          </div>
        `;

        // Load prev/next after rendering
        loadAdjacentPosts(post);

      } catch (e) {
        container.innerHTML = `<a href="index.html" class="back-link">Home</a><p class="post-not-found">Post not found.</p>`;
      }
    }

    async function loadAdjacentPosts(post) {
      if (typeof getPostsByCategory !== 'function') return;
      try {
        const allPosts = await getPostsByCategory(post.category);
        allPosts.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
        const idx  = allPosts.findIndex(p => p.id === post.id);
        const prev = idx < allPosts.length - 1 ? allPosts[idx + 1] : null; // older
        const next = idx > 0 ? allPosts[idx - 1] : null;                   // newer

        if (!prev && !next) return;

        const nav = document.createElement('nav');
        nav.className = 'post-nav';
        nav.setAttribute('aria-label', 'Post navigation');

        if (prev) {
          nav.innerHTML += `
            <a href="post.html?id=${prev.id}" class="post-nav-btn post-nav-prev">
              <span class="post-nav-label">Previous</span>
              <span class="post-nav-title">${prev.title}</span>
            </a>`;
        } else {
          nav.innerHTML += '<div class="post-nav-empty"></div>';
        }

        if (next) {
          nav.innerHTML += `
            <a href="post.html?id=${next.id}" class="post-nav-btn post-nav-next">
              <span class="post-nav-label">Next</span>
              <span class="post-nav-title">${next.title}</span>
            </a>`;
        } else {
          nav.innerHTML += '<div class="post-nav-empty"></div>';
        }

        document.querySelector('.post-wrapper').appendChild(nav);
      } catch(e) { /* silent */ }
    }


    function renderSection(sec, isPoem) {
      switch (sec.type) {
        case 'title':
          return `<h2 class="section-title-block">${sec.content || ''}</h2>`;
        case 'text':
          return `<div class="section-text">${sec.content || ''}</div>`;
        case 'paragraph':
          if (isPoem) return `<div class="poem-stanza">${sec.content || ''}</div>`;
          return `<div class="section-paragraph">${sec.content || ''}</div>`;
        case 'quote':
          return `<blockquote class="section-quote">${sec.content || ''}</blockquote>`;
        case 'image':
          return sec.content ? `<img class="section-img" src="${sec.content}" alt="">` : '';
        case 'divider':
          return `<hr class="section-divider-line">`;
        default:
          return `<div>${sec.content || ''}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadPost);
  </script>
</body>
